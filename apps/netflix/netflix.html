<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Accedi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #333;
            min-height: 100vh;
            position: relative;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(0, 0, 0, 0.6),
                rgba(0, 0, 0, 0.8)
            ),
            url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="%23141414"/><path d="M0 0h1920v1080H0z" fill="url(%23gradient)"/><defs><linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="%23e50914" stop-opacity="0.1"/><stop offset="100%" stop-color="%23000" stop-opacity="0.9"/></linearGradient></defs></svg>');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 50px;
            z-index: 10;
        }

        .logo {
            color: #e50914;
            font-size: 32px;
            font-weight: bold;
            text-decoration: none;
            font-family: 'Arial Black', sans-serif;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.75);
            padding: 60px 68px 40px;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }

        .login-title {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
            position: relative;
        }

        .form-input {
            width: 100%;
            height: 50px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            padding: 16px 20px 0;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            background: #454545;
        }

        .form-input:focus + .form-label,
        .form-input:not(:placeholder-shown) + .form-label {
            top: 7px;
            font-size: 11px;
            color: #8c8c8c;
        }

        .form-label {
            position: absolute;
            top: 16px;
            left: 20px;
            color: #8c8c8c;
            font-size: 16px;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .login-button {
            width: 100%;
            height: 48px;
            background: #e50914;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin: 24px 0;
            transition: background 0.2s ease;
        }

        .login-button:hover {
            background: #f6121d;
        }

        .login-button:active {
            background: #d40813;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
            color: #b3b3b3;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

        .checkbox {
            margin-right: 8px;
            width: 16px;
            height: 16px;
        }

        .help-link {
            color: #b3b3b3;
            text-decoration: none;
        }

        .help-link:hover {
            text-decoration: underline;
        }

        .signup-text {
            color: #737373;
            font-size: 16px;
        }

        .signup-link {
            color: #fff;
            text-decoration: none;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .captcha-text {
            color: #8c8c8c;
            font-size: 13px;
            margin-top: 16px;
            line-height: 1.4;
        }

        .captcha-link {
            color: #0080ff;
            text-decoration: none;
        }

        .captcha-link:hover {
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 740px) {
            .header {
                padding: 20px 20px;
            }

            .logo {
                font-size: 24px;
            }

            .login-box {
                padding: 60px 32px 40px;
                background: rgba(0, 0, 0, 0.9);
            }

            .login-title {
                font-size: 28px;
            }
        }

        @media (max-width: 500px) {
            .login-container {
                padding: 0;
            }

            .login-box {
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
        }

        /* Animazioni */
        .login-box {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-input:invalid {
            border-bottom: 2px solid #e87c03;
        }

        .error-message {
            color: #e87c03;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .form-input:invalid + .form-label + .error-message {
            display: block;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <header class="header">
        <a href="#" class="logo">NETFLIX</a>
    </header>

    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Accedi</h1>
            
            <form action="/cgi-bin/cgi_script.py" method="POST">
                <div class="form-group">
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        placeholder=" "
                        required
                    >
                    <label class="form-label" for="email">E-mail o numero di telefono</label>
                    <div class="error-message">Inserisci un indirizzo e-mail valido.</div>
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        placeholder=" "
                        minlength="4"
                        required
                    >
                    <label class="form-label" for="password">Password</label>
                    <div class="error-message">La password deve contenere almeno 4 caratteri.</div>
                </div>

                <button type="submit" class="login-button">Accedi</button>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" class="checkbox">
                        Ricordati di me
                    </label>
                    <a href="#" class="help-link">Serve aiuto?</a>
                </div>
            </form>

            <div class="signup-text">
                Prima volta su Netflix? 
                <a href="#" class="signup-link">Registrati subito</a>
            </div>

            <div class="captcha-text">
                Questa pagina è protetta da Google reCAPTCHA per garantire che tu non sia un bot. 
                <a href="#" class="captcha-link">Ulteriori informazioni.</a>
            </div>
        </div>
    </div>

    <script>
        // Gestione del form
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                // Simulazione di login
                const button = document.querySelector('.login-button');
                button.textContent = 'Accesso in corso...';
                button.disabled = true;
                
                setTimeout(() => {
                    alert('Login simulato con successo!\nEmail: ' + email);
                    button.textContent = 'Accedi';
                    button.disabled = false;
                }, 1500);
            }
        });

        // Effetto di focus sui campi input
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });

        // Animazione di caricamento della pagina
        window.addEventListener('load', function() {
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
