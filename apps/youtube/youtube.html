<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi a YouTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .youtube-logo {
            margin-bottom: 30px;
        }

        .youtube-logo svg {
            width: 120px;
            height: auto;
        }

        .welcome-text {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #5f6368;
            margin-bottom: 32px;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: #fff;
            color: #202124;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .login-btn:hover {
            border-color: #1976d2;
            box-shadow: 0 2px 8px rgba(25, 118, 210, 0.2);
            transform: translateY(-1px);
        }

        .google-btn {
            background: #fff;
            border-color: #dadce0;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #1976d2;
        }

        .youtube-btn {
            background: #ff0000;
            color: #fff;
            border-color: #ff0000;
        }

        .youtube-btn:hover {
            background: #cc0000;
            border-color: #cc0000;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .youtube-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #5f6368;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dadce0;
        }

        .divider span {
            padding: 0 16px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-container {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
            background: #fff;
        }

        .form-input:focus {
            border-color: #1976d2;
        }

        .form-input:focus + .form-label,
        .form-input:not(:placeholder-shown) + .form-label {
            transform: translateY(-32px) scale(0.85);
            color: #1976d2;
            background: #fff;
            padding: 0 8px;
        }

        .form-label {
            position: absolute;
            top: 16px;
            left: 16px;
            font-size: 16px;
            color: #5f6368;
            pointer-events: none;
            transition: all 0.3s ease;
            transform-origin: left;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #5f6368;
            cursor: pointer;
            font-size: 14px;
        }

        .password-toggle:hover {
            color: #1976d2;
        }

        .forgot-password {
            color: #1976d2;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-form-btn {
            width: 100%;
            padding: 14px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 24px;
        }

        .login-form-btn:hover {
            background: #cc0000;
        }

        .login-form-btn:disabled {
            background: #e0e0e0;
            color: #9e9e9e;
            cursor: not-allowed;
        }

        .signup-link {
            margin-top: 24px;
            color: #5f6368;
            font-size: 14px;
        }

        .signup-link a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .footer-info {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
            color: #5f6368;
            font-size: 12px;
            line-height: 1.4;
        }

        .footer-info a {
            color: #1976d2;
            text-decoration: none;
        }

        .footer-info a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px;
                margin: 0 16px;
            }
            
            .welcome-text {
                font-size: 20px;
            }
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="youtube-logo">

            </svg>
        </div>

        <h1 class="welcome-text">Accedi a YouTube</h1>
        <p class="subtitle">Continua con il tuo account Google</p>

        <div class="main-options">
            <div class="login-options">
                <button class="login-btn google-btn" onclick="showGoogleLogin()">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continua con Google
                </button>

                <button class="login-btn youtube-btn" onclick="showEmailLogin()">
                    <svg class="youtube-icon" viewBox="0 0 24 24">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                    Accedi con Email
                </button>
            </div>

            <div class="divider">
                <span>oppure</span>
            </div>

            <div class="form-container" id="emailForm">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <div class="input-container">
                            <input type="email" class="form-input" placeholder=" " required id="emailInput">
                            <label class="form-label">Email o nome utente</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-container">
                            <input type="password" class="form-input" placeholder=" " required id="passwordInput">
                            <label class="form-label">Password</label>
                            <button type="button" class="password-toggle" onclick="togglePassword()">Mostra</button>
                        </div>
                    </div>

                    <div style="text-align: right; margin-bottom: 20px;">
                        <a href="#" class="forgot-password">Password dimenticata?</a>
                    </div>

                    <button type="submit" class="login-form-btn">Accedi</button>
                </form>
            </div>

            <div class="signup-link">
                Non hai un account? <a href="#">Registrati gratuitamente</a>
            </div>

            <div class="footer-info">
                Accedendo accetti i <a href="#">Termini di servizio</a> e l'<a href="#">Informativa sulla privacy</a> di YouTube e Google.
            </div>
        </div>
    </div>

    <script>
        function showGoogleLogin() {
            alert('Questa è una demo. Reindirizzamento al login Google...');
        }

        function showEmailLogin() {
            const formContainer = document.getElementById('emailForm');
            const loginOptions = document.querySelector('.login-options');
            const divider = document.querySelector('.divider');
            
            if (formContainer.style.display === 'none' || formContainer.style.display === '') {
                formContainer.style.display = 'block';
                loginOptions.style.display = 'none';
                divider.style.display = 'none';
            } else {
                formContainer.style.display = 'none';
                loginOptions.style.display = 'flex';
                divider.style.display = 'flex';
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const toggleBtn = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = 'Nascondi';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = 'Mostra';
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            if (email && password) {
                alert('Questa è solo una demo. Credenziali inserite:\nEmail: ' + email + '\nPassword: ' + password);
            }
        }

        // Gestione floating labels
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('blur', function() {
                if (this.value === '') {
                    this.classList.remove('has-value');
                } else {
                    this.classList.add('has-value');
                }
            });
        });
    </script>
</body>
</html>
