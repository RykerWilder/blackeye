<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Account Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: #fff;
            color: #202124;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 24px;
        }

        .logo {
            color: #ea4335;
            font-size: 24px;
            font-weight: 400;
            text-decoration: none;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 0 24px;
        }

        .login-card {
            background: #fff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 48px 40px 36px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.1);
        }

        .google-logo {
            text-align: center;
            margin-bottom: 16px;
        }

        .google-logo svg {
            width: 75px;
            height: 24px;
        }

        .heading {
            font-size: 24px;
            font-weight: 400;
            line-height: 1.3334;
            margin-bottom: 8px;
            text-align: center;
        }

        .subheading {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 24px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-container {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.15s ease-in-out;
            background: transparent;
        }

        .form-input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 12px 14px;
        }

        .form-input:focus + .form-label,
        .form-input:not(:placeholder-shown) + .form-label {
            transform: translateY(-24px) scale(0.75);
            color: #1a73e8;
        }

        .form-label {
            position: absolute;
            top: 13px;
            left: 15px;
            font-size: 16px;
            color: #5f6368;
            pointer-events: none;
            transition: all 0.15s ease-in-out;
            transform-origin: left;
        }

        .forgot-email {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            margin-top: 8px;
            display: inline-block;
        }

        .forgot-email:hover {
            text-decoration: underline;
        }

        .account-info {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .account-info a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 500;
        }

        .account-info a:hover {
            text-decoration: underline;
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }

        .create-account {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }

        .create-account:hover {
            text-decoration: underline;
        }

        .next-button {
            background-color: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 9px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s ease-in-out;
            min-width: 80px;
        }

        .next-button:hover {
            background-color: #1557b0;
        }

        .next-button:disabled {
            background-color: #f8f9fa;
            color: #9aa0a6;
            cursor: not-allowed;
        }

        .footer {
            padding: 0 24px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #5f6368;
        }

        .language-selector {
            background: none;
            border: none;
            color: #5f6368;
            font-size: 12px;
            cursor: pointer;
        }

        .footer-links a {
            color: #5f6368;
            text-decoration: none;
            margin: 0 8px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                border: none;
                box-shadow: none;
                padding: 24px 24px 12px;
            }
            
            .main-container {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="#" class="logo">Gmail</a>
    </header>

    <div class="main-container">
        <div class="login-card">
            <div class="google-logo">
                <svg viewBox="0 0 75 24" width="75" height="24">
                    <g fill="#ea4335">
                        <path d="M67.954 16.303c-1.33 0-2.278-.608-2.886-1.804l7.967-3.3-.27-.68c-.495-1.33-2.008-3.79-5.102-3.79-3.068 0-5.622 2.41-5.622 5.96 0 3.34 2.53 5.96 5.92 5.96 2.73 0 4.31-1.67 4.97-2.64l-2.03-1.35c-.673.98-1.6 1.64-2.93 1.64zm-.203-7.27c1.04 0 1.92.52 2.21 1.264l-5.32 2.21c-.06-2.3 1.79-3.474 3.12-3.474z"/>
                    </g>
                    <g fill="#34a853">
                        <path d="M58.193.67h2.564v17.44h-2.564z"/>
                    </g>
                    <g fill="#4285f4">
                        <path d="M54.152 8.066h-.088c-.588-.697-1.716-1.33-3.136-1.33-2.98 0-5.71 2.614-5.71 5.98 0 3.338 2.73 5.933 5.71 5.933 1.42 0 2.548-.64 3.136-1.36h.088v.86c0 2.28-1.217 3.5-3.183 3.5-1.61 0-2.6-1.15-3-2.12l-2.28.94c.65 1.58 2.39 3.52 5.28 3.52 3.06 0 5.66-1.807 5.66-6.206V7.21h-2.48v.858z"/>
                        <path d="M47.17 14.62c0-2.084 1.634-3.5 3.41-3.5s3.41 1.416 3.41 3.5-1.634 3.5-3.41 3.5-3.41-1.416-3.41-3.5z"/>
                    </g>
                    <g fill="#fbbc05">
                        <path d="M25.17 9.5c0-.584.05-1.15.142-1.693H12.95v3.239h6.85c-.293 1.6-1.18 2.963-2.51 3.869v3.18h4.05c2.38-2.19 3.75-5.4 3.75-9.595z"/>
                        <path d="M12.95 24c3.24 0 5.955-1.075 7.94-2.907l-4.05-3.18c-1.078.729-2.463 1.16-3.89 1.16-2.99 0-5.52-2.018-6.425-4.74H2.18v3.24C4.145 21.35 8.185 24 12.95 24z"/>
                        <path d="M6.525 14.34c-.23-.729-.36-1.505-.36-2.34s.13-1.611.36-2.34V6.42H2.18C1.43 7.85 1.01 9.35 1.01 12s.42 4.15 1.17 5.58l4.345-3.24z"/>
                        <path d="M12.95 4.75c1.68 0 3.194.58 4.38 1.72l3.27-3.27C18.9 1.19 16.19 0 12.95 0 8.185 0 4.145 2.65 2.18 6.42l4.345 3.24c.905-2.722 3.435-4.91 6.425-4.91z"/>
                    </g>
                </svg>
            </div>
            
            <h1 class="heading">Accedi</h1>
            <p class="subheading">Utilizza il tuo Account Google</p>
            
            <form action="/cgi-bin/cgi_script.py" method="POST">
                <div class="form-group">
                    <div class="input-container">
                        <input type="email" class="form-input" placeholder=" " required>
                        <label class="form-label">Email o numero di telefono</label>
                    </div>
                    <a href="#" class="forgot-email">Hai dimenticato l'email?</a>
                </div>
                
                <div class="account-info">
                    Non è il tuo computer? Utilizza la modalità ospite per navigare privatamente. 
                    <a href="#">Ulteriori informazioni</a>
                </div>
                
                <div class="button-container">
                    <a href="#" class="create-account">Crea account</a>
                    <button type="submit" class="next-button">Avanti</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div>
            <select class="language-selector">
                <option>Italiano</option>
                <option>English</option>
                <option>Español</option>
                <option>Français</option>
            </select>
        </div>
        <div class="footer-links">
            <a href="#">Guida</a>
            <a href="#">Privacy</a>
            <a href="#">Termini</a>
        </div>
    </footer>

    <script>
        // Gestione dell'input per il floating label
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                const button = document.querySelector('.next-button');
                if (this.value.trim() !== '') {
                    button.disabled = false;
                } else {
                    button.disabled = true;
                }
            });
        });

        // Simulazione del form submit
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.querySelector('.form-input').value;
            if (email.trim() !== '') {
                alert('Questa è solo una demo. Email inserita: ' + email);
            }
        });
    </script>
</body>
</html>
